<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Control Panel</title>
    
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-center: #0f172a;
            --bg-edge: #000000;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            
            --grad-red: linear-gradient(135deg, #ff4b2b 0%, #ff416c 100%);
            --grad-blue: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            --grad-green: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --grad-dark: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            --grad-purple: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%);
            --grad-orange: linear-gradient(135deg, #f12711 0%, #f5af19 100%);
            
            --glow-red: rgba(255, 65, 108, 0.5);
            --glow-blue: rgba(0, 114, 255, 0.5);
            --glow-green: rgba(56, 239, 125, 0.5);
            --glow-dark: rgba(75, 108, 183, 0.4);
            --glow-purple: rgba(142, 45, 226, 0.5);
            --glow-orange: rgba(241, 39, 17, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 16px;
        }

        /* Космический фон (Stars & Nebula) */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: #030712; 
            overflow: hidden;
        }

        .stars-1 {
            position: absolute;
            top: -100%; left: -100%; width: 300%; height: 300%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 250px 90px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 300px 200px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 350px 350px;
            animation: moveStars 120s linear infinite;
        }

        .stars-2 {
            position: absolute;
            top: -100%; left: -100%; width: 300%; height: 300%;
            background-image: 
                radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 30px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 280px 100px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 350px 250px, rgba(255,255,255,0.8), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 400px 400px;
            animation: moveStars 80s linear infinite;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 30% 70%, rgba(74, 0, 224, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(0, 242, 254, 0.08) 0%, transparent 50%);
            animation: rotateNebula 60s linear infinite;
            pointer-events: none;
        }

        @keyframes moveStars {
            0% { transform: translateY(0); }
            100% { transform: translateY(20%); }
        }

        @keyframes rotateNebula {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            position: relative;
        }

        /* Settings Gear Icon */
        .settings-btn {
            position: absolute;
            top: 0px; right: 0px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 50%;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 50;
            transition: all 0.2s;
        }
        .settings-btn:hover { background: rgba(255, 255, 255, 0.15); transform: rotate(45deg); }
        .settings-btn svg { width: 20px; height: 20px; }

        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
        }

        .header p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 14px;
            color: #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00f2fe;
            border-radius: 50%;
            box-shadow: 0 0 10px #00f2fe;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .app-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .app-icon {
            font-size: 20px;
            background: rgba(255, 255, 255, 0.05);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .app-actions {
            display: flex;
            gap: 10px;
        }

        button {
            border: none;
            outline: none;
            border-radius: 14px;
            padding: 14px 10px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.92);
            transition: 0.1s;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: 0.5s;
        }
        button:hover::after {
            left: 150%;
        }

        .btn-danger { background: var(--grad-red); }
        .btn-danger:hover { box-shadow: 0 8px 25px var(--glow-red); }

        .btn-primary { background: var(--grad-blue); }
        .btn-primary:hover { box-shadow: 0 8px 25px var(--glow-blue); }

        .btn-warning { background: var(--grad-orange); }
        .btn-warning:hover { box-shadow: 0 8px 25px var(--glow-orange); }

        .btn-lock { background: var(--grad-purple); }
        .btn-lock:hover { box-shadow: 0 8px 25px var(--glow-purple); }

        .btn-sm {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
        }

        .btn-play { background: var(--grad-green); }
        .btn-play:hover { box-shadow: 0 6px 20px var(--glow-green); }

        .btn-stop { background: var(--grad-dark); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-stop:hover { box-shadow: 0 6px 20px var(--glow-dark); }
        
        .btn-neutral { background: var(--grad-dark); }
        .btn-neutral:hover { box-shadow: 0 8px 25px var(--glow-dark); }

        /* Overlays (Модальные окна) */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .overlay-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .overlay-title {
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: 700;
            color: #ef4444;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }
        
        .timer-title {
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }
        
        .setup-title {
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
            margin-bottom: 5px;
        }

        .overlay-text {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .overlay-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-field {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 15px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .input-field:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0,242,254,0.3);
        }

        /* Таймер */
        .timer-count {
            font-size: 80px;
            font-weight: 900;
            color: #ff416c;
            text-shadow: 0 0 30px rgba(255, 65, 108, 0.6);
            margin: 20px 0 30px 0;
            line-height: 1;
        }

        @media (max-width: 380px) {
            .btn-grid { grid-template-columns: 1fr; }
            .btn-row { flex-direction: column; align-items: flex-start; gap: 16px; }
            .app-actions { width: 100%; }
            .app-actions button { flex: 1; }
        }
    </style>
</head>
<body>

    <!-- SPACE ANIMATED BACKGROUND -->
    <div class="space-bg">
        <div class="nebula"></div>
        <div class="stars-1"></div>
        <div class="stars-2"></div>
    </div>

    <!-- OVERLAY: System Setup -->
    <div id="settings-overlay" class="overlay">
        <div class="overlay-card">
            <div class="overlay-title setup-title">SYSTEM SETUP</div>
            <div class="overlay-text" style="font-size: 13px; margin-bottom: 20px; color: #94a3b8; font-weight: 500;">ENTER CREDENTIALS TO CONNECT</div>
            <input type="text" id="bot-token" class="input-field" placeholder="Bot Token">
            <input type="text" id="chat-id" class="input-field" placeholder="Chat ID">
            <button class="btn-play" style="width: 100%; padding: 18px; margin-top: 10px;" onclick="saveSettings()">SAVE AND INITIALIZE</button>
            <button class="btn-stop" id="btn-logout" style="width: 100%; padding: 16px; margin-top: 12px; display: none;" onclick="clearSettings()">CLEAR (LOGOUT)</button>
        </div>
    </div>

    <!-- OVERLAY: Confirm Action -->
    <div id="confirm-overlay" class="overlay">
        <div class="overlay-card">
            <div class="overlay-title">SYSTEM WARNING</div>
            <div class="overlay-text">ARE YOU SURE?</div>
            <div class="overlay-buttons">
                <button class="btn-danger" onclick="handleConfirm(true)">YES</button>
                <button class="btn-neutral" onclick="handleConfirm(false)">NO</button>
            </div>
        </div>
    </div>

    <!-- OVERLAY: Timer Countdown -->
    <div id="timer-overlay" class="overlay">
        <div class="overlay-card">
            <div class="overlay-title timer-title">ACTION INITIATED. EXECUTING IN:</div>
            <div id="timer-count" class="timer-count">10</div>
            <button class="btn-danger" style="width: 100%; padding: 18px;" onclick="abortTimer()">ABORT</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="container">
        
        <button class="settings-btn" onclick="openSettings()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>

        <div class="header">
            <h1>Nexus Control</h1>
            <p>COMMAND CENTER</p>
        </div>

        <!-- Блок Питания -->
        <div class="card">
            <div class="card-title">SYSTEM</div>
            <div class="btn-grid">
                <!-- Кнопки с таймером -->
                <button class="btn-danger" onclick="confirmSystemAction('/shutdown')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg> Shutdown
                </button>
                <button class="btn-primary" onclick="confirmSystemAction('/reboot')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg> Restart
                </button>
                
                <!-- Мгновенные кнопки -->
                <button class="btn-lock" style="grid-column: 1 / -1;" onclick="sendCmd('/lock_pc', this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> Lock PC
                </button>
            </div>
        </div>

        <!-- Блок Софта -->
        <div class="card">
            <div class="card-title">APPLICATIONS</div>
            
            <div class="btn-row">
                <div class="app-info">
                    <div class="app-icon">
                        <svg width="22" height="22" fill="#ffffff" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.454 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.265 2.265-1.253 0-2.265-1.014-2.265-2.265z"/></svg>
                    </div>
                    Steam
                </div>
                <div class="app-actions">
                    <button class="btn-sm btn-play" onclick="sendCmd('/launch_steam', this)">Launch</button>
                    <button class="btn-sm btn-stop" onclick="sendCmd('/kill_steam', this)">Kill</button>
                </div>
            </div>

            <div class="btn-row">
                <div class="app-info">
                    <div class="app-icon">
                        <svg width="22" height="22" fill="#ffffff" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3.537 0C2.165 0 1.66.506 1.66 1.879V18.44a4.262 4.262 0 00.02.433c.031.3.037.59.316.92.027.033.311.245.311.245.153.075.258.13.43.2l8.335 3.491c.433.199.614.276.928.27h.002c.314.006.495-.071.928-.27l8.335-3.492c.172-.07.277-.124.43-.2 0 0 .284-.211.311-.243.28-.33.285-.621.316-.92a4.261 4.261 0 00.02-.434V1.879c0-1.373-.506-1.88-1.878-1.88zm13.366 3.11h.68c1.138 0 1.688.553 1.688 1.696v1.88h-1.374v-1.8c0-.369-.17-.54-.523-.54h-.235c-.367 0-.537.17-.537.539v5.81c0 .369.17.54.537.54h.262c.353 0 .523-.171.523-.54V8.619h1.373v2.143c0 1.144-.562 1.71-1.7 1.71h-.694c-1.138 0-1.7-.566-1.7-1.71V4.82c0-1.144.562-1.709 1.7-1.709zm-12.186.08h3.114v1.274H6.117v2.603h1.648v1.275H6.117v2.774h1.74v1.275h-3.14zm3.816 0h2.198c1.138 0 1.7.564 1.7 1.708v2.445c0 1.144-.562 1.71-1.7 1.71h-.799v3.338h-1.4zm4.53 0h1.4v9.201h-1.4zm-3.13 1.235v3.392h.575c.354 0 .523-.171.523-.54V4.965c0-.368-.17-.54-.523-.54zm-3.74 10.147a1.708 1.708 0 01.591.108 1.745 1.745 0 01.49.299l-.452.546a1.247 1.247 0 00-.308-.195.91.91 0 00-.363-.068.658.658 0 00-.28.06.703.703 0 00-.224.163.783.783 0 00-.151.243.799.799 0 00-.056.299v.008a.852.852 0 00.056.31.7.7 0 00.157.245.736.736 0 00.238.16.774.774 0 00.303.058.79.79 0 00.445-.116v-.339h-.548v-.565H7.37v1.255a2.019 2.019 0 01-.524.307 1.789 1.789 0 01-.683.123 1.642 1.642 0 01-.602-.107 1.46 1.46 0 01-.478-.3 1.371 1.371 0 01-.318-.455 1.438 1.438 0 01-.115-.58v-.008a1.426 1.426 0 01.113-.57 1.449 1.449 0 01.312-.46 1.418 1.418 0 01.474-.309 1.58 1.58 0 01.598-.111 1.708 1.708 0 01.045 0zm11.963.008a2.006 2.006 0 01.612.094 1.61 1.61 0 01.507.277l-.386.546a1.562 1.562 0 00-.39-.205 1.178 1.178 0 00-.388-.07.347.347 0 00-.208.052.154.154 0 00-.07.127v.008a.158.158 0 00.022.084.198.198 0 00.076.066.831.831 0 00.147.06c.062.02.14.04.236.061a3.389 3.389 0 01.43.122 1.292 1.292 0 01.328.17.678.678 0 01.207.24.739.739 0 01.071.337v.008                 <div class="app-actions">
                    <button class="btn-sm btn-play" onclick="sendCmd('/launch_anydesk', this)">Launch</button>
                    <button class="btn-sm btn-stop" onclick="sendCmd('/kill_anydesk', this)">Kill</button>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#030712');
        tg.setBackgroundColor('#000000');
        tg.ready();

        let botToken = localStorage.getItem('bot_token') || '';
        let chatId = localStorage.getItem('chat_id') || '';

        // Проверяем авторизацию при загрузке
        if (!botToken || !chatId) {
            document.getElementById('settings-overlay').style.display = 'flex';
        }

        function openSettings() {
            document.getElementById('bot-token').value = botToken;
            document.getElementById('chat-id').value = chatId;
            document.getElementById('settings-overlay').style.display = 'flex';
            if(botToken && chatId) {
                document.getElementById('btn-logout').style.display = 'block';
            }
        }

        function saveSettings() {
            const tokenInput = document.getElementById('bot-token').value.trim();
            const idInput = document.getElementById('chat-id').value.trim();
            if (tokenInput && idInput) {
                botToken = tokenInput;
                chatId = idInput;
                localStorage.setItem('bot_token', botToken);
                localStorage.setItem('chat_id', chatId);
                document.getElementById('settings-overlay').style.display = 'none';
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
        }

        function clearSettings() {
            localStorage.removeItem('bot_token');
            localStorage.removeItem('chat_id');
            botToken = '';
            chatId = '';
            document.getElementById('bot-token').value = '';
            document.getElementById('chat-id').value = '';
            document.getElementById('btn-logout').style.display = 'none';
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        let pendingCommand = null;
        let countdownTimer = null;
        let timeRemaining = 10;

        function sendCmd(cmd, btnElement) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            if (!botToken || !chatId) {
                openSettings();
                return;
            }

            // Визуальный отклик (вспышка зеленым на 1 сек)
            if (btnElement) {
                const originalBg = btnElement.style.background;
                const originalShadow = btnElement.style.boxShadow;
                
                btnElement.style.background = '#10b981';
                btnElement.style.boxShadow = '0 0 20px rgba(16,185,129,0.8)';
                
                setTimeout(() => {
                    btnElement.style.background = originalBg;
                    btnElement.style.boxShadow = originalShadow;
                }, 1000);
            }

            // Генерация уникального секретного топика на основе токена
            const secretTopic = "nexus_" + btoa(botToken).replace(/[^a-zA-Z0-9]/g, '').substring(0, 20);

            // Отправка скрытого POST-запроса через бесплатный ретранслятор ntfy.sh
            fetch(`https://ntfy.sh/${secretTopic}`, {
                method: 'POST',
                body: cmd
            }).catch(err => console.error("Error:", err));
        }

        // ШАГ 1: Показать окно подтверждения
        function confirmSystemAction(cmd) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            pendingCommand = cmd;
            document.getElementById('confirm-overlay').style.display = 'flex';
        }

        // ШАГ 2 & 3: Обработка YES/NO
        function handleConfirm(isConfirmed) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            document.getElementById('confirm-overlay').style.display = 'none';
            
            if (isConfirmed) {
                startTimer();
            } else {
                pendingCommand = null;
            }
        }

        // Запуск таймера
        function startTimer() {
            timeRemaining = 10;
            document.getElementById('timer-count').innerText = timeRemaining;
            document.getElementById('timer-overlay').style.display = 'flex';
            
            countdownTimer = setInterval(() => {
                timeRemaining--;
                document.getElementById('timer-count').innerText = timeRemaining;
                
                if (timeRemaining <= 0) {
                    clearInterval(countdownTimer);
                    executePendingCommand();
                }
            }, 1000);
        }

        // ШАГ 4: Кнопка ABORT внутри таймера
        function abortTimer() {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            clearInterval(countdownTimer);
            document.getElementById('timer-overlay').style.display = 'none';
            pendingCommand = null;
        }

        // ШАГ 5: Финальное исполнение после таймера
        function executePendingCommand() {
            if (pendingCommand) {
                sendCmd(pendingCommand, null);
                document.getElementById('timer-overlay').style.display = 'none';
                pendingCommand = null;
            }
        }
    </script>
